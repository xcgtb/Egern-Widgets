name: "Server Monitor 探针"
description: "服务器状态监控仪表盘配置面板"

env_schema:
  WIDGET_NAME:
    name: 节点名称
    default_value: "My Node"

  SERVER_HOST:
    name: 主机地址
    default_value: "1.1.1.1"   # ← 改成你的服务器IP

  SERVER_PORT:
    name: 端口
    default_value: "22"

  SERVER_USER:
    name: 用户名
    default_value: "root"

  SERVER_PASSWORD:
    name: 密码
    default_value: ""

  SERVER_KEY:
    name: 私钥
    default_value: ""

  TRAFFIC_LIMIT:
    name: 流量限制 (GB)
    default_value: "2000"

  RESET_DAY:
    name: 流量重置日
    default_value: "1"

scriptings:
- generic:
    name: 节点探针-Monitor
    script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/Probe.js

widgets:
  - name: 节点探针-Monitor
    script_name: 节点探针-Monitor