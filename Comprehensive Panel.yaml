name: "综合面板小组件合集"
description: "包含黄历、油价、网络信息、服务器监控与加密货币的组件合集"

# --- 环境变量配置区 (已集成：黄历星座、油价地区、探针参数) ---
env_schema:
  # 1. 黄历/日历配置
  MY_ZODIAC:
    name: 我的星座
    description: "选填，例如：狮子座。不填则根据当前日期自动计算。"
    default_value: ""
    
  # 2. 今日油价配置
  GAS_REGION:
    name: 油价地区代码
    description: "请前往 m.qiyoujiage.com 查看，例如：guangdong/guangzhou"
    default_value: "sichuan/chengdu"
  SHOW_TREND:
    name: 显示油价趋势
    description: "是否显示本轮调价趋势，填写 true 或 false"
    default_value: "true"

  # 3. 服务器探针配置 (Server Monitor)
  WIDGET_NAME:
    name: 节点名称
    description: 探针显示的节点名称
    default_value: "My Node"
  SERVER_HOST:
    name: 主机地址
    description: SSH / 探针服务器地址 (必填)
    default_value: ""
  SERVER_PORT:
    name: 端口
    description: SSH 端口号
    default_value: "22"
  SERVER_USER:
    name: 用户名
    description: SSH 登录用户名
    default_value: "root"
  SERVER_PASSWORD:
    name: 密码
    description: SSH 密码（与私钥二选一）
    default_value: ""
  SERVER_KEY:
    name: 私钥
    description: SSH 私钥（与密码二选一）
    default_value: ""
  BWH_VEID:
    name: 搬瓦工 VEID
    description: 填写搬瓦工的 VEID (选填)
    default_value: ""
  BWH_API_KEY:
    name: 搬瓦工 API Key
    description: 填写搬瓦工的 API Key (选填)
    default_value: ""
  TRAFFIC_LIMIT:
    name: 流量限制 (GB)
    description: 每月流量上限
    default_value: "2000"
  RESET_DAY:
    name: 流量重置日
    description: 每月几号重置流量
    default_value: "1"

# --- 脚本引入区 ---
scriptings:
  - generic:
      name: 黄历信息-HL
      script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/HL.js
      
  - generic:
      name: 今日油价-Youjia
      script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/Youjia.js
      
  - generic:
      name: 网络高级-NetworkPro
      script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/Network-Pro.js
      
  - generic:
      name: 节点探针-Monitor
      script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/Probe.js
      
  - generic:
      name: 加密货币-Crypto
      script_url: https://raw.githubusercontent.com/xcgtb/Egern-Widgets/main/Crypto.js

# --- 面板展示区 ---
widgets:
  - name: 黄历信息-HL
    script_name: 黄历信息-HL
    
  - name: 今日油价-Youjia
    script_name: 今日油价-Youjia
    
  - name: 网络高级-NetworkPro
    script_name: 网络高级-NetworkPro
    
  - name: 节点探针-Monitor
    script_name: 节点探针-Monitor
    
  - name: 加密货币-Crypto
    script_name: 加密货币-Crypto